<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLEXZY GAMES</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(rgba(0, 15, 25, 0.85), rgba(0, 10, 20, 0.9)),
      url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat fixed;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 70px;
      color: #00ffcc;
      text-shadow: 0 0 25px #00ffcc;
    }

    .main-btn {
      background: #00ffcc;
      border: 5px solid #00ffff;
      padding: 25px 90px;
      font-size: 2rem;
      cursor: pointer;
      border-radius: 20px;
    }

    .games-screen { display: none; }
    .games-screen.active { display: block; }

    .games-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .game-card {
      width: 140px;
      height: 140px;
      border-radius: 16px;
      border: 3px solid #00ffcc;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.3s;
    }

    .game-card:hover {
      transform: scale(1.1);
      border-color: #00ffff;
    }

    .game-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.75);
    }

    .game-title {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 0.75rem;
    }

    /* GAME AREA */
    .game-area { display: none; }
    .game-area.active { display: block; }

    iframe {
      width: 100%;
      height: 720px;
      border: 6px solid #00ffff;
      border-radius: 20px;
    }

    button {
      margin-top: 20px;
      padding: 15px 40px;
      font-family: 'Press Start 2P';
      background: #00ffcc;
      border: none;
      cursor: pointer;
      border-radius: 10px;
    }

  </style>
</head>

<body>

  <!-- MAIN -->
  <div id="mainScreen">
    <h1>FLEXZY GAMES</h1>
    <button class="main-btn" onclick="showGames()">PLAY</button>
  </div>

  <!-- GAMES -->
  <div id="gamesScreen" class="games-screen">

    <div class="games-grid">

      <div class="game-card" onclick="loadGame('PROXY','https://676719.github.io/Proxyhack//')">
        <img src="https://www.google.com/imgres?q=haker&imgurl=https%3A%2F%2Fcdn-images.dzcdn.net%2Fimages%2Fartist%2Fec371a73fa9c0ac91595be33e4104de5%2F1900x1900-000000-81-0-0.jpg&imgrefurl=https%3A%2F%2Fwww.deezer.com%2Fes%2Fartist%2F53448312&docid=rP8gUsIDIJlvNM&tbnid=Qm_yyhB17EhNmM&vet=12ahUKEwj5leqltu6UAxWVUaQEHS_6BlUQnPAOegQIIBAB..i&w=1900&h=1900&hcb=2&ved=2ahUKEwj5leqltu6UAxWVUaQEHS_6BlUQnPAOegQIIBAB">
        <div class="game-title">PROXY</div>
      </div>

      <div class="game-card" onclick="loadGame('Racing','https://slope2unblocked.github.io/')">
        <img src="https://images.unsplash.com/photo-1504215680853-026ed2a45def?auto=format&fit=crop&w=500&q=80">
      </div>

      <div class="game-card" onclick="loadGame('Shooter','https://1v1lol-unblocked.bitbucket.io/')">
        <img src="https://images.unsplash.com/photo-1551103782-8ab07afd45c1?auto=format&fit=crop&w=500&q=80">
      </div>

      <div class="game-card" onclick="loadGame('Arcade','https://geometrydashunblocked.github.io/')">
        <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&w=500&q=80">
      </div>

    </div>

    <!-- BOTÓN VOLVER INICIO -->
    <button onclick="backToMain()">← VOLVER AL INICIO</button>

  </div>

  <!-- GAME AREA -->
  <div id="gameArea" class="game-area">
    <h2 id="gameTitle" style="color:#00ffcc;"></h2>
    <iframe id="gameFrame"></iframe>

    <!-- BOTONES VOLVER -->
    <div>
      <button onclick="backToGames()">← VOLVER A JUEGOS</button>
      <button onclick="backToMain()">🏠 INICIO</button>
    </div>
  </div>

  <script>
    function showGames() {
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('gamesScreen').classList.add('active');
    }

    function loadGame(title, url) {
      document.getElementById('gamesScreen').classList.remove('active');
      document.getElementById('gameArea').classList.add('active');

      document.getElementById('gameTitle').textContent = title;
      document.getElementById('gameFrame').src = url;
    }

    function backToGames() {
      document.getElementById('gameFrame').src = '';
      document.getElementById('gameArea').classList.remove('active');
      document.getElementById('gamesScreen').classList.add('active');
    }

    function backToMain() {
      document.getElementById('gameFrame').src = '';
      document.getElementById('gameArea').classList.remove('active');
      document.getElementById('gamesScreen').classList.remove('active');
      document.getElementById('mainScreen').style.display = 'block';
    }
  </script>

</body>
</html>

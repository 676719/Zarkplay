        background: linear-gradient(rgba(0, 15, 25, 0.85), rgba(0, 10, 20, 0.9)),
      url('9oADAMBAAIRAxEAPwD85KDCj0XllDgQ4RSWIpZOLBhQgoUGFEzShQYULJFBKEUoqQiysKDChBRUikFCgwoWVKDFiBxkikKQwkGixFIVGRJkqpQWZGScjCgwo5XpFDgQoRTUShjJQoMKEFCgwomaUKDChZKFBiwinCGKWShQYsIKEMKEFCgQoQUWIqBRRhQhYsFUyTIySsjJKjIkzIyLkosGFHK9EocCHCChQYsUZOLBhQg4sGFCyUKDChBQoMIs0oQwoQsKCsTJrBiwinFgrCDiwYpBQoC6gbJraUTajILrajJMzJqSsOsC5OFAhRyvQOFAhQh6RYMIslCgQoQcWDChBQoMKFkoUCFCDhQIUTJLEUgoQQoQUUYUIKLBWVAlGVSCXRZItXRZAtbRZJdZESVkZFykKBCjlegcKBChBwoEOFkosGFCCKDFiZOFAhQgocCLCycKDFIpxRiwgoUoxYgUWDFINQhaQS6CoHraOtpBto62pEw62pEmpqakWsOsk5YoKxyvQOLBhQgocecOEGsGLCycWDCiBQoEIg4sGFCyUKBChBSlBWVA1CUiyUXRVIlHV0gpVBdQwlHW0otZNZBWRkl1k1NSVk1EXMxUiuV3lCgQoQUOPOHCycIIUIKFAhEEUCFEycKBFhBwoEUg4QRZSDlWUV1A4oSrKWSXRVItXQXSCUdbUi1tHV1JdbU1tSVE1tSVQ1UnNQoEKOZ3qUFYWTWDChBQ5XnClIplBlVMlCgFCClKAUpBQgKVAoUoKQcqgUpBaso6qB6uhq6QTDq6gTamskuroskWpqMkusjJKyayTm4UAo53cUUYRBQgKVAoUCFKQcKV5ylKWTijFhBxRWVA5VApSClKUIuoGuhKpByroSrqB6oaulYWro6yB62iyBauhraketoa2pFraOskWojJOdlKAUc7uKFAhQglgxSDiwJSiZOFKEWEPSLAlKEFCBdIOVQiyoHKsorpBLoyrqBaujq6kWroaukHraLageto62pHraGtpR62jqaEepo62pFrBrJPgrBivg7ShQJSIKFAiyoEUorCChBKUqZIpQ1ZSHorzlKUg1GVSCXR1kjXQ0tILV0F1Al0dbUD1tHWSPWHW1LC1tHW1AtbR1tSLWHW1ImHWRfBhRmfF1qUrMkqxmLJSqzIKsrMQSxmIWVZWZApV1mIVWZBdVGKXV1mQVdZkm1dZkG1tVim1tZkm1tZkm1NZkm1mYJ=80') center/cover no-repeat fixed;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 70px;
      color: #00ffcc;
      text-shadow: 0 0 25px #00ffcc;
    }

    .main-btn {
      background: #00ffcc;
      border: 5px solid #00ffff;
      padding: 25px 90px;
      font-size: 2rem;
      cursor: pointer;
      border-radius: 20px;
    }

    .games-screen { display: none; }
    .games-screen.active { display: block; }

    .games-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .game-card {
      width: 140px;
      height: 140px;
      border-radius: 16px;
      border: 3px solid #00ffcc;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.3s;
    }

    .game-card:hover {
      transform: scale(1.1);
      border-color: #00ffff;
    }

    .game-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.75);
    }

    .game-title {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 0.7rem;
      text-shadow: 0 0 10px #00ffff;
    }

    .game-area { display: none; }
    .game-area.active { display: block; }

    iframe {
      width: 100%;
      height: 720px;
      border: 6px solid #00ffff;
      border-radius: 20px;
    }

    button {
      margin-top: 20px;
      padding: 15px 40px;
      font-family: 'Press Start 2P';
      background: #00ffcc;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      margin-right: 10px;
    }

  </style>

<body>

  <!-- MAIN -->
  <div id="mainScreen">
    <h1>Flexzy Games</h1>
    <button class="main-btn" onclick="showGames()">PLAY</button>
  </div>

  <!-- GAMES -->
  <div id="gamesScreen" class="games-screen">

    <div class="games-grid">

      <div class="game-card" onclick="loadGame('PROXY','https://676719.github.io/Proxyhack/')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSiqfVKfK_mS3_i7M60lo5QwK4XgqnlDuv3iA&s=80">
        <div class="game-title">PROXY</div>
      </div>

      <div class="game-card" onclick="loadGame('Racing','https://slope2unblocked.github.io/')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSr8t8oHw_gcbhKQH4tco63NPe6Jaf0OaueNg&s=80">
      </div>

      <div class="game-card" onclick="loadGame('Shooter','https://1v1lol-unblocked.bitbucket.io/')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbkEhpMuX8FeOg_oipY-8bFO-WHOeKf-EKNw&s=80">
      </div>

      <div class="game-card" onclick="loadGame('Arcade','https://geometrydashunblocked.github.io/')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSsm4r9Bs9GM0T1KdFWR__VOqVlVo9Hl4sstA&s=80">
      </div>

      <div class="game-card" onclick="loadGame('Parkour','https://slopegame.io/')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMS4qFKdKWJ9B4O8yGe_bkf4dIEZ5AspDRCA&s=80">
      </div>

      <div class="game-card" onclick="loadGame('Driving','https://www.friv.com/')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRH-yYe1srohrExBbwW8rssSsqU2Lw7n-4CSg&s=80">
      </div>

      <div class="game-card" onclick="loadGame('Action','https://krunker.io/')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZySam2BRYGssXMjfof1UJI1PaQ7stjjuOxfI4hbnf&s=80">
      </div>

      <div class="game-card" onclick="loadGame('Sandbox','https://sandboxels.r74n.com/')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRjGZQRaU_o1KtwvC4bCmDLbE2b0sL_lr7iIA&s=80">
      </div>
      
      <div class="game-card" onclick="loadGame('FIRE ANDE WATER','https://html5.gamedistribution.com/a55c9cc9c21e4fc683c8c6857f3d0c75/?utm_source=gameforge.com&utm_medium=fireboy-and-watergirl-1-forest-temple&utm_campaign=block-and-redirect')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0QJ-6XJmvNDQk9sODGU8_u_w_hKuWNvVIOCBFYflbLw&s=80">
      </div>

    </div>

    <button onclick="backToMain()">← VOLVER AL INICIO</button>
  </div>

  <!-- GAME -->
  <div id="gameArea" class="game-area">
    <h2 id="gameTitle" style="color:#00ffcc;"></h2>
    <iframe id="gameFrame"></iframe>

    <!-- BOTONES NUEVOS -->
    <div>
      <button onclick="backToGames()">← VOLVER A JUEGOS</button>
      <button onclick="openFullScreen()">FULL SCREN</button>
      <button onclick="backToMain()">🏠 INICIO</button>
    </div>
  </div>

  <script>
    let currentUrl = '';

    function showGames() {
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('gamesScreen').classList.add('active');
    }

    function loadGame(title, url) {
      currentUrl = url;

      document.getElementById('gamesScreen').classList.remove('active');
      document.getElementById('gameArea').classList.add('active');

      document.getElementById('gameTitle').textContent = title;
      document.getElementById('gameFrame').src = url;
    }

    function backToGames() {
      document.getElementById('gameFrame').src = '';
      document.getElementById('gameArea').classList.remove('active');
      document.getElementById('gamesScreen').classList.add('active');
    }

    function backToMain() {
      document.getElementById('gameFrame').src = '';
      document.getElementById('gameArea').classList.remove('active');
      document.getElementById('gamesScreen').classList.remove('active');
      document.getElementById('mainScreen').style.display = 'block';
    }

    function openFullScreen() {
      if (!currentUrl) return;

      const win = window.open("about:blank", "_blank");

      win.document.write(`
        <html>
          <head>
            <title>FULL SCREN</title>
            <style>
              body,html{margin:0;padding:0;height:100%;overflow:hidden;background:black;}
              iframe{width:100%;height:100%;border:none;}
            </style>
          </head>
          <body>
            <iframe src="${currentUrl}" allowfullscreen></iframe>
          </body>
        </html>
      `);

      win.document.close();
    }
  </script>

</body>
</html>
